<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found — Trail's End Cottage</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  :root{--paper:#F7F5F0;--ink:#1A1A1A;--sage:#5C6B5A;--serif:Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;}
  *{margin:0;box-sizing:border-box}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
    min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
  .eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--sage)}
  h1{font-family:var(--serif);font-weight:400;font-size:clamp(2rem,6vw,3.2rem);margin:.6rem 0 1rem}
  p{max-width:40ch;margin:0 auto 2rem;line-height:1.7}
  a{display:inline-block;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:.78rem;
    text-decoration:none;padding:.9rem 2rem;border:1px solid var(--ink);color:var(--ink);border-radius:2px}
  a:hover{background:var(--ink);color:var(--paper)}
</style>
</head>
<body>
  <div>
    <p class="eyebrow">Trail&rsquo;s End Cottage</p>
    <h1>This trail doesn&rsquo;t lead anywhere.</h1>
    <p>The page you&rsquo;re looking for isn&rsquo;t here. Let&rsquo;s get you back to the cottage.</p>
    <a href="/">Return home</a>
  </div>
</body>
</html>
